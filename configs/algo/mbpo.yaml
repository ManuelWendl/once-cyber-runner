name: mbpo
n_envs: 64

# ── SAC hyperparams ───────────────────────────────────────────────────────────
learning_rate: 3e-4
batch_size: 256
tau: 0.005
gamma: 0.99
ent_coef: auto   # thermostat: holds policy at target_entropy and self-adjusts α.
                 # A fixed small value removes the entropy TARGET, so the policy
                 # collapses (entropy free-falls) and ep_rew destabilizes.
target_entropy: 0.0     # NOT auto(=-2). At -2 the policy over-concentrates early,
                       # α decays to ~0.001 (entropy regularisation effectively OFF),
                       # and the twin-critic can no longer hold back overestimation →
                       # Q ran away to 280 with critic_loss→3.6e5 (~130k onward).
                       # target_entropy=0 keeps the policy mildly stochastic so α
                       # stays alive (~0.05-0.2) and keeps regularising the critic.

# ── World model ───────────────────────────────────────────────────────────────
ensemble_size: 5
num_elites: 3                  # (unused) elites replaced by std calibration
hidden_sizes: [512, 512, 512]
model_lr: 3e-4
model_weight_decay: 0
model_train_freq: 50          # retrain world model every N env steps
rollout_freq: 250              # regenerate synthetic rollouts every N env steps
model_train_epochs: 50
model_batch_size: 512
sig_min: 1e-3                  # min aleatoric std (reference sig_min clamp)
sig_max: 1e3                   # max aleatoric std (reference sig_max clamp)
sampling_type: TS1             # rollout sampling: mean | TS1 | TSInf | DS

# ── Reward conditioning ───────────────────────────────────────────────────────
# MBPO trains SAC on RAW rewards (env.norm_reward is off so real+analytic-model
# rewards stay on one scale). Raw rewards here have std≈13 with ±644 outliers
# (spurious Δprogress spikes), which wrecks the critic — pure SAC only works
# because VecNormalize divides rewards by ≈40 (running return-std) and clips ±10.
# We replicate that with a FIXED scale+clip applied to every stored reward.
reward_scale: 25.0             # ≈ VecNormalize divisor sqrt(ret_rms.var) measured
                               # AFTER the Δprogress clip removed the ±640 spikes
                               # (was 38 with the artifact → 23 without; 25 ≈ that,
                               # allowing for the divisor growing as the policy improves)
reward_clip: 10.0              # matches VecNormalize clip_reward

# ── Buffers ───────────────────────────────────────────────────────────────────
real_buffer_size: 1_000_000
model_buffer_size: 1_000_000     # SAC's replay buffer (synthetic model rollouts + penalty transitions)
real_ratio: 1                # fraction of each SAC batch drawn from real data (rest = model rollouts)

# ── Rollout schedule ──────────────────────────────────────────────────────────
warmup_steps: 10_048           # pure random collection before model training
                               # (multiple of n_envs=64; matches SAC learning_starts≈10k)
rollout_batch_size: 400        # initial states per rollout call
min_rollout_length: 1
max_rollout_length: 3
rollout_schedule_steps: 1_000_000  # steps over which length grows min→max
rollout_unc_threshold: 0.5     # truncate an imagined branch once its predictive
                               # uncertainty ‖σ‖₂ exceeds this, so rollouts stay in
                               # the model's reliable region instead of compounding
                               # error off-distribution (which blew up the SAC critic
                               # in run earthy-shape-214 at rollout_len=5). On-dist
                               # model_unc ≈ 0.3, drift spikes >1.0, so ~0.5 passes
                               # normal steps and cuts drift. null disables. Watch
                               # train/rollout_len_eff vs rollout_len to tune.

# ── Exploration ───────────────────────────────────────────────────────────────
optimism: 0.0                  # rollout reward += optimism * ‖σ‖₂ (model prediction
                               # uncertainty). Optimism in the face of uncertainty;
                               # 0.0 disables. Tune against train/model_unc (the mean
                               # ‖σ‖₂) so the bonus is a sensible fraction of the reward.

# ── Policy update ─────────────────────────────────────────────────────────────
utd_ratio: 64                   # SAC gradient steps per env step (after warmup)
