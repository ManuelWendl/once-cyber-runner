# @package _global_
# Backup policy trained with PPO instead of SAC.
# Binary recovery reward — V(s) = P(recover within episode | s).
# Run: python train.py +experiment=backup-ppo

defaults:
  - override /algo: ppo_backup

total_timesteps: 1_000_000

env:
  episode_length: 200
  randomize_init_pos: true
  backup_mode: true
  recovery_speed_threshold: 0.05
  recovery_tilt_threshold: 0.1
  recovery_hole_margin_factor: 2.0
  backup_init_max_speed: 0.075
  # unused in backup_mode but required by schema:
  reward_every_n_waypoints: 3
  hole_penalty: 5.0
