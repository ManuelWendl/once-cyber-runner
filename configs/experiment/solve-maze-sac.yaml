# @package _global_
# SAC baseline — stable off-policy learning, auto-tuned entropy
# Run: python train.py +experiment=solve-maze-sac

defaults:
  - override /algo: sac

total_timesteps: 1_000_000

env:
  dense_main_reward: true
  dense_main_progress_scale: 100.0  # tune this
  reward_every_n_waypoints: 3
  hole_penalty: 5.0
  episode_length: 2000
