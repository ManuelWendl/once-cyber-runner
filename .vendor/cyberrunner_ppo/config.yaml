# Brax PPO training config for cyberrunner_ppo.

env:
  episode_length: 2000      # 60Hz control * 33s — matches cleaned env default
  num_envs: 4096            # Brax will VmapWrapper this many copies
  randomize_init_pos: true
  num_rays: 32              # raycast rays for path-progress occlusion check
  history_length: 5         # frame-stack depth: each frame is [joint(2), ball(2), action(2)]
  maze_layout: hard         # easy | medium | hard — selects polyline + walls + holes
  # Safe-prior task. When true:
  #   - spawn gets mild random tilt (init_tilt_frac × joint range) and ball
  #     velocity (uniform in [0, init_ball_speed]).
  #   - reward / obs depend on safe_prior_strategy (below).
  safe_prior: true
  # Reward strategy. Pick one:
  #   - exp_d:       reward = exp(-‖ball - frozen_target‖). Baseline.
  #                  Frozen target = closest backward strict-corner from spawn.
  #                  Obs flips next-waypoint vectors backward toward target.
  #   - exp_d_sigma: reward = exp(-‖ball - frozen_target‖ / sigma). Steeper
  #                  basin around the corner. Same target / obs as exp_d.
  #   - survival:    reward = 1.0 per alive step. No target, no obs flip.
  #                  Hole termination is the implicit penalty (truncated
  #                  future return).
  safe_prior_strategy: exp_d
  safe_prior_sigma: 0.02    # only used when strategy == exp_d_sigma
  init_ball_speed: 0.05     # m/s, max planar speed at spawn
  init_tilt_frac: 0.05      # fraction of joint range used for spawn tilt
  # Optional mid-episode tilt bumps (challenge perturbations). Each step,
  # with probability `tilt_bump_prob`, both joint angles get an additive
  # delta uniform in [-mag, +mag] × half_joint_range, clipped to range.
  tilt_bumps: false
  tilt_bump_prob: 0.01           # per-step probability of a bump
  tilt_bump_magnitude: 0.05      # fraction of half-joint-range

training:
  num_timesteps: 100_000_000
  num_evals: 20
  brax_ppo:
    learning_rate: 3.0e-4
    entropy_cost: 1.0e-3
    discounting: 0.99
    unroll_length: 64
    num_minibatches: 32
    num_updates_per_batch: 4
    batch_size: 256
    reward_scaling: 1.0
    normalize_observations: true
    network:
      hidden_sizes: [512, 256, 128]
      activation: swish

checkpoint_dir: checkpoints
seed: 0
wandb:
  enabled: false
  project: cyberrunner_ppo
