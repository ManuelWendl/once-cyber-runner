defaults:
  - algo: sac
  - _self_

total_timesteps: 1_000_000
device: cuda

env:
  reward_every_n_waypoints: 3
  hole_penalty: 5.0
  dense_main_progress_scale: 100.0  # main-task (prior_mode=false) dense progress shaping:
                                    # reward = (curr_progress - prev_progress) * this
  obs_n_stack: 5                    # stack the last N (observation, action) frames so a
                                    # feed-forward policy can infer velocity (1 = no stacking)
  episode_length: 2000
  randomize_init_pos: false
  layout: hard
  # Prior (recovery / stabilization) branch — see CyberRunnerEnv.prior_mode.
  prior_mode: false
  recovery_speed_threshold: 0.03    # m/s — ball must be slower than this to count as recovered
  recovery_hole_margin_factor: 3.0  # ball must be > HOLE_RADIUS + N*MARBLE_RADIUS from any hole
  prior_init_max_speed: 0.2         # max random spawn speed in prior_mode

wandb:
  enabled: true
  project: cyberrunner
  name: null  # auto-generated if null
  tags: []
  log_interval: 10_000  # timesteps between wandb log calls (same cadence for PPO and SAC)

hydra:
  run:
    dir: .
  output_subdir: null
