defaults:
  - algo: sac
  - hardware: euler
  - override hydra/launcher: slurm
  - _self_

total_timesteps: 1_000_000
device: cuda
seed: 0   # global RNG seed (env, SB3 policy/sampling, world model). Vary per run
          # for sweeps: python train.py -m +experiment=... seed=0,1,2

env:
  reward_every_n_waypoints: 3
  hole_penalty: 5.0
  dense_main_progress_scale: 100.0  # main-task (prior_mode=false) dense progress shaping:
                                    # reward = (curr_progress - prev_progress) * this
  obs_n_stack: 5                    # stack the last N (observation, action) frames so a
                                    # feed-forward policy can infer velocity (1 = no stacking)
  episode_length: 2000
  randomize_init_pos: true
  layout: hard
  # Prior (recovery / stabilization) branch — see CyberRunnerEnv.prior_mode.
  prior_mode: false
  recovery_speed_threshold: 0.03    # m/s — ball must be slower than this to count as recovered
  recovery_hole_margin_factor: 3.0  # ball must be > HOLE_RADIUS + N*MARBLE_RADIUS from any hole
  prior_init_max_speed: 0.2         # max random spawn speed in prior_mode

wandb:
  enabled: true
  project: cyberrunner
  name: null  # auto-generated if null
  tags: []
  log_interval: 10_000  # timesteps between wandb log calls (same cadence for PPO and SAC)
  mode: null  # null=online; set "offline" on the cluster to avoid the end-of-run
              # upload stall, then `wandb sync $SCRATCH/wandb/offline-run-*` from a login node

hydra:
  # Write all run output (working dir, saved artifacts, submitit logs) under
  # $SCRATCH on the cluster — home/project quota is small. Falls back to the
  # repo dir locally where $SCRATCH is unset.
  run:
    dir: ${oc.env:SCRATCH,.}/cyberrunner_runs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    # Multirun / SLURM: each job gets its own subdir so per-run artifacts
    # (model .zip, vecnormalize.pkl, env_cfg.json) don't collide.
    dir: ${oc.env:SCRATCH,.}/cyberrunner_runs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  output_subdir: null
