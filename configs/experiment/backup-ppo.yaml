# @package _global_
# Prior (recovery) policy trained with PPO.
# Binary recovery reward — V(s) = P(recover within episode | s).
# Run: python train.py +experiment=backup-ppo

defaults:
  - override /algo: ppo_backup

total_timesteps: 5_000_000

env:
  episode_length: 200
  randomize_init_pos: true
  prior_mode: true
  recovery_speed_threshold: 0.01  # generous threshold so random exploration sometimes succeeds
  recovery_hole_margin_factor: 1.0
  prior_init_max_speed: 0.2      # 1.5x threshold — same ratio as the original working config
  # unused in prior_mode but required by schema:
  reward_every_n_waypoints: 3
  hole_penalty: 5.0
