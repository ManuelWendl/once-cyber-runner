# W&B sweep for the GPU PPO prior (dense version), 1M steps per run.
#
# Usage:
#   wandb sweep sweeps/ppo_gpu_sweep.yaml
#   # then dispatch agents on the cluster (see sweeps/launch_sweep.sh)
#
# The sweep maximizes the dense success rate at evaluation.
# Each agent run trains for STEPS=1_000_000 with PRIOR_VERSION=dense.

program: train_ppo_gpu.py
method: bayes
metric:
  name: eval/episode_success
  goal: maximize

# Pinned by the sweep wrapper (not searched), but kept here so the runs
# launched by `wandb agent` outside the sbatch wrapper are still well-formed.
command:
  - ${env}
  - python
  - ${program}
  - --steps=1000000
  - --num_envs=8192
  - --num_eval_envs=128
  - --batch_size=256
  - --num_minibatches=32
  - --episode_length=500
  - --num_evals=20
  - --save_every_evals=10
  - --solver_iterations=6
  - --ls_iterations=6
  - --init_ball_speed=0.05
  - --init_tilt_frac=0.05
  - --prior_version=dense
  - --wandb_project=cyberrunner-prior-gpu-sweep
  - --wandb_entity=filippostaffoni-eth-z-rich
  - ${args}

parameters:
  learning_rate:
    distribution: log_uniform_values
    min: 3.0e-5
    max: 5.0e-4
  entropy_cost:
    distribution: log_uniform_values
    min: 1.0e-4
    max: 1.0e-2
  clip_eps:
    distribution: uniform
    min: 0.1
    max: 0.3
  gae_lambda:
    distribution: uniform
    min: 0.9
    max: 0.99
  discounting:
    values: [0.97, 0.99, 0.995]
  unroll_length:
    values: [10, 20, 40]
  num_updates_per_batch:
    values: [5, 10, 15]
  seed:
    values: [0, 1, 2]

# Stop bad runs early via Hyperband on the same metric.
early_terminate:
  type: hyperband
  min_iter: 5
  eta: 3
