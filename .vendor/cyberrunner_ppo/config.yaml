# Brax PPO training config for cyberrunner_ppo.

env:
  episode_length: 2000      # 60Hz control * 33s — matches cleaned env default
  num_envs: 4096            # Brax will VmapWrapper this many copies
  randomize_init_pos: true
  num_rays: 32              # raycast rays for path-progress occlusion check
  history_length: 5         # frame-stack depth: each frame is [joint(2), ball(2), action(2)]
  # Safe-prior task. When true:
  #   - reward = exp(-‖ball - frozen_target‖) where target is the closest
  #     backward strict-corner relative to spawn (frozen at reset).
  #   - spawn gets mild random tilt (init_tilt_frac × joint range) and ball
  #     velocity (uniform in [0, init_ball_speed]).
  #   - the two next-waypoint vectors in obs flip from forward (toward maze
  #     end) to backward (toward the frozen target).
  safe_prior: true
  init_ball_speed: 0.05     # m/s, max planar speed at spawn
  init_tilt_frac: 0.05      # fraction of joint range used for spawn tilt

training:
  num_timesteps: 100_000_000
  num_evals: 20
  brax_ppo:
    learning_rate: 3.0e-4
    entropy_cost: 1.0e-3
    discounting: 0.99
    unroll_length: 64
    num_minibatches: 32
    num_updates_per_batch: 4
    batch_size: 256
    reward_scaling: 1.0
    normalize_observations: true
    network:
      hidden_sizes: [512, 256, 128]
      activation: swish

checkpoint_dir: checkpoints
seed: 0
wandb:
  enabled: false
  project: cyberrunner_ppo
